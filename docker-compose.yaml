services:
  postgres:
    image: postgres:16-alpine
    container_name: draft-go
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432" # host:container
    volumes:
      - postgres_data:/var/lib/postgresql/data #name volume
volumes:
  postgres_data: #khai bao volume
